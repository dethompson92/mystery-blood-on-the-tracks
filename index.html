<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood on the Tracks: A Cold Case Mystery</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cutive+Mono&family=Special+Elite&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f6e8;
            /* Aged paper */
            --text-color: #2c3e50;
            --accent-color: #c0392b;
            /* Blood/Stamp Red */
            --sidebar-bg: #1a252f;
            --sidebar-text: #ecf0f1;
            --noir-dark: #121212;
            --paper-texture: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #dcdcdc;
            --accent-color: #e74c3c;
            --sidebar-bg: #000000;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            margin: 0;
            font-family: 'EB Garamond', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #34495e;
        }

        .sidebar-header h2 {
            font-family: 'Special Elite', cursive;
            font-size: 1.5rem;
            margin: 0;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .nav-section {
            padding: 10px 0;
        }

        .nav-section-title {
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7f8c8d;
            background: rgba(0, 0, 0, 0.2);
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background-color: #34495e;
        }

        .nav-item.active {
            background-color: #2c3e50;
            border-left-color: var(--accent-color);
        }

        .nav-item.read {
            opacity: 0.6;
        }

        /* Main Content Area */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #top-bar {
            height: 60px;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        #search-box {
            flex: 1;
            max-width: 400px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        #content-viewer {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-image: var(--paper-texture);
        }

        /* Document Styling Injection Point */
        .document-body {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            min-height: 100%;
        }

        body.dark-mode .document-body {
            background: #222;
            color: #eee;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
        }

        /* Landing Page Style */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('Images/23_silver_comet_train_night_countryside.png');
            background-size: cover;
            color: white;
            padding: 40px;
        }

        #landing-page h1 {
            font-family: 'Special Elite', cursive;
            font-size: 4rem;
            margin-bottom: 10px;
            color: var(--accent-color);
            text-shadow: 2px 2px 10px black;
        }

        .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-family: 'Special Elite', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* Utility */
        .stamp-effect {
            position: absolute;
            top: 20px;
            right: 20px;
            border: 4px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 15px;
            font-family: 'Special Elite', cursive;
            text-transform: uppercase;
            transform: rotate(15deg);
            opacity: 0.8;
            pointer-events: none;
        }

        /* Image Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* Notes Panel */
        #notes-panel {
            width: 300px;
            background: #fff9e6;
            border-left: 2px solid #dcdcdc;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        body.dark-mode #notes-panel {
            background: #2c2c2c;
            border-left-color: #444;
        }

        #notes-panel h3 {
            font-family: 'Special Elite', cursive;
            margin-top: 0;
            color: var(--accent-color);
        }

        #notes-panel textarea {
            flex-grow: 1;
            padding: 10px;
            font-family: 'Cutive Mono', monospace;
            resize: none;
            line-height: 1.6;
            background: #fff;
            border: 1px solid #dcdcdc;
        }

        body.dark-mode #notes-panel textarea {
            background: #1a1a1a;
            color: #eee;
            border-color: #444;
        }

        .action-btn {
            background: none;
            border: 1px solid #7f8c8d;
            color: inherit;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Cutive Mono', monospace;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .action-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Forensic Diagram Styling */
        .evidence-highlight {
            margin: 30px 0;
            padding: 25px;
            background: #fff;
            border: 1px solid #dcdcdc;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--accent-color);
            text-align: center;
            page-break-inside: avoid;
        }

        .forensic-diagram {
            width: 100%;
            max-width: 100%;
            height: auto;
            border: 1px solid #2c3e50;
            display: block;
            margin: 0 auto 15px auto;
            cursor: zoom-in;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease-in-out;
        }

        .forensic-diagram:hover {
            transform: scale(1.01);
        }

        .diagram-caption {
            font-family: 'Cutive Mono', monospace;
            font-size: 0.9rem;
            color: #444;
            margin-top: 12px;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .evidence-tag-inline {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 3px 10px;
            font-family: 'Special Elite', cursive;
            font-size: 0.75rem;
            margin-bottom: 12px;
            transform: rotate(-1deg);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        @media print {
            .evidence-highlight {
                box-shadow: none;
                border: 1px solid #000;
                border-left-width: 6px;
                background: white !important;
            }

            .forensic-diagram {
                box-shadow: none;
                border-color: #000;
            }

            .evidence-image {
                max-width: 100% !important;
                box-shadow: none !important;
            }

            .portrait-image {
                max-width: 220px !important;
                box-shadow: none !important;
            }
        }

        /* ── Evidence Photo Images ── */
        .evidence-image-container {
            margin: 25px 0;
            text-align: center;
            page-break-inside: avoid;
        }

        .evidence-image {
            width: 100%;
            max-width: 700px;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 2px solid #666;
            box-shadow: 3px 3px 12px rgba(0, 0, 0, 0.25);
            cursor: zoom-in;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .evidence-image:hover {
            transform: scale(1.01);
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.4);
        }

        .image-caption {
            font-family: 'Cutive Mono', monospace;
            font-size: 0.85rem;
            color: #555;
            margin-top: 10px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        body.dark-mode .image-caption {
            color: #aaa;
        }

        /* ── Character Portrait Images ── */
        .portrait-container {
            text-align: center;
            margin: 20px 0;
            page-break-inside: avoid;
        }

        .portrait-image {
            width: 240px;
            height: 300px;
            object-fit: cover;
            border: 3px solid #666;
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.3);
            display: block;
            margin: 0 auto;
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        .portrait-image:hover {
            transform: scale(1.03);
        }

        /* ── Photo Placeholder (for docs without real images) ── */
        .photo-placeholder {
            width: 100%;
            max-width: 700px;
            height: 350px;
            background-color: #d8d4c8;
            border: 3px solid #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #666;
            font-family: 'Cutive Mono', monospace;
            margin: 15px auto;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, .06) 10px, rgba(0, 0, 0, .06) 20px);
        }

        /* ── Mobile Responsiveness ── */
        #mobile-menu-toggle {
            display: none;
            cursor: pointer;
            z-index: 1001;
        }

        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        @media (max-width: 768px) {
            #mobile-menu-toggle {
                display: block;
            }

            #sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                transition: left 0.3s ease;
                z-index: 1000;
            }

            #sidebar.sidebar-open {
                left: 0;
            }

            #sidebar.sidebar-open+#main-container #sidebar-overlay {
                display: block;
            }

            #main-container {
                width: 100%;
            }

            #top-bar {
                padding: 0 10px;
                gap: 10px;
            }

            #breadcrumb {
                display: none;
            }

            #search-box {
                max-width: none;
            }

            #content-viewer {
                padding: 20px 10px;
            }

            .document-body {
                padding: 20px;
                box-shadow: none;
            }

            #case-progress {
                display: none;
            }

            .action-btn {
                padding: 5px 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>BLOOD ON THE TRACKS</h2>
            <div style="font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px;">CASE NO. 1957-BCBN</div>
        </div>

        <div id="nav-list">
            <!-- Navigation items will be injected here -->
        </div>

        <div style="margin-top: auto; padding: 20px; border-top: 1px solid #34495e;">
            <button id="toggle-dark-mode"
                style="width: 100%; padding: 10px; background: none; border: 1px solid #7f8c8d; color: inherit; cursor: pointer; font-family: 'Cutive Mono', monospace;">TOGGLE
                NOIR MODE</button>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="main-container">
        <div id="top-bar">
            <button id="mobile-menu-toggle" class="action-btn" onclick="toggleSidebar()">☰</button>
            <span id="breadcrumb">CASE_FILES / ...</span>
            <input type="text" id="search-box" placeholder="Search case files...">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" onclick="toggleNotes()">DEDUCTION LOG</button>
                <button class="action-btn" onclick="window.print()">PRINT FILE</button>
            </div>
            <div id="case-progress" style="font-family: 'Cutive Mono', monospace; font-size: 0.8rem;">FILES READ: 0/36
            </div>
        </div>

        <div id="content-viewer">
            <div id="landing-page">
                <h1>Blood on the Tracks</h1>
                <p style="font-size: 1.5rem; max-width: 600px;">A locked-room mystery unfolding on the Silver Comet
                    express. Solve the 1957 murder through 2024 cold case evidence.</p>
                <button class="start-btn" onclick="startInvestigation()">START INVESTIGATION</button>
            </div>

            <div id="doc-active-content" style="display: none;">
                <div class="document-body" id="doc-injection-point">
                    <!-- HTML content will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <script src="data.js"></script> <!-- This will contain the document content -->
    <script>
        let currentDoc = null;
        let readFiles = JSON.parse(localStorage.getItem('readFiles') || '[]');
        let notes = JSON.parse(localStorage.getItem('caseNotes') || '{}');

        function startInvestigation() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('doc-active-content').style.display = 'block';
            loadDocument('23_player_investigation_guide'); // Start with the player guide as recommended
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-open');
        }

        function loadDocument(id) {
            const doc = caseData.documents[id];
            if (!doc) return;

            currentDoc = id;
            const container = document.getElementById('doc-injection-point');

            // Close sidebar on mobile after selection
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('sidebar-open');
            }

            // Add a "STAMP" for official reports
            let headerExtra = '';
            if (id.startsWith('01') || id.startsWith('02') || id.startsWith('03')) {
                headerExtra = '<div class="stamp-effect">OFFICIAL RECORD</div>';
            }

            container.innerHTML = headerExtra + doc.body;

            // Mark as read
            if (!readFiles.includes(id)) {
                readFiles.push(id);
                localStorage.setItem('readFiles', JSON.stringify(readFiles));
                updateProgress();
            }

            renderNav(); // Re-render to show active/read status

            document.getElementById('breadcrumb').innerText = `CASE_FILES / ${doc.title.toUpperCase()}`;

            // Update Note Area
            document.getElementById('note-editor').value = notes[id] || '';

            // Re-bind image clickers for lightbox
            const images = container.querySelectorAll('img');
            images.forEach(img => {
                img.style.cursor = 'zoom-in';
                img.onclick = (e) => {
                    e.preventDefault();
                    showLightbox(img.src);
                };
            });

            container.scrollTop = 0;

            // Highlight search terms if any
            const searchTerm = document.getElementById('search-box').value.trim();
            if (searchTerm.length > 2) {
                highlightText(container, searchTerm);
            }
        }

        function highlightText(element, term) {
            const regex = new RegExp(`(${term})`, 'gi');
            const walk = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            let node;
            const nodesToReplace = [];
            while (node = walk.nextNode()) {
                if (node.parentElement.tagName !== 'SCRIPT' && node.parentElement.tagName !== 'STYLE') {
                    nodesToReplace.push(node);
                }
            }
            nodesToReplace.forEach(node => {
                const parent = node.parentNode;
                const html = node.nodeValue.replace(regex, '<mark style="background: #f1c40f; color: black;">$1</mark>');
                const span = document.createElement('span');
                span.innerHTML = html;
                parent.replaceChild(span, node);
            });
        }

        function showLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.style.display = 'flex';
        }

        function toggleNotes() {
            const panel = document.getElementById('notes-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
            if (panel.style.display === 'flex') {
                document.getElementById('case-notes-area').focus();
            }
        }

        function saveNotes() {
            const content = document.getElementById('case-notes-area').value;
            localStorage.setItem('caseNotes', JSON.stringify({ content: content }));
        }

        function loadNotes() {
            const stored = JSON.parse(localStorage.getItem('caseNotes') || '{"content":""}');
            document.getElementById('case-notes-area').value = stored.content;
        }

        function updateProgress() {
            const total = Object.keys(caseData.documents).length;
            document.getElementById('case-progress').innerText = `FILES READ: ${readFiles.length}/${total}`;
        }

        function renderNav(filter = '') {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = '';

            const lowerFilter = filter.toLowerCase();

            caseData.structure.forEach(section => {
                const sectionItems = section.items.filter(itemId => {
                    const doc = caseData.documents[itemId];
                    return !filter || (doc && (doc.title.toLowerCase().includes(lowerFilter) || doc.body.toLowerCase().includes(lowerFilter)));
                });

                if (sectionItems.length > 0) {
                    const sectionHeader = document.createElement('div');
                    sectionHeader.className = 'nav-section-title';
                    sectionHeader.innerText = section.title;
                    nav.appendChild(sectionHeader);

                    sectionItems.forEach(itemId => {
                        const itemData = caseData.documents[itemId];
                        if (!itemData) return;

                        const item = document.createElement('div');
                        item.className = `nav-item ${readFiles.includes(itemId) ? 'read' : ''} ${currentDoc === itemId ? 'active' : ''}`;
                        item.innerHTML = `<span>${itemData.icon || '📄'}</span> ${itemData.shortTitle || itemData.title}`;
                        item.onclick = () => loadDocument(itemId);
                        nav.appendChild(item);
                    });
                }
            });
        }

        // Search logic
        document.getElementById('search-box').oninput = (e) => {
            renderNav(e.target.value);
        };

        // Note saving logic
        document.getElementById('note-editor').oninput = (e) => {
            if (currentDoc) {
                notes[currentDoc] = e.target.value;
                localStorage.setItem('caseNotes', JSON.stringify(notes));
            }
        };

        document.getElementById('toggle-dark-mode').onclick = () => {
            document.body.classList.toggle('dark-mode');
        };

        // Initialize
        if (typeof caseData !== 'undefined') {
            renderNav();
            updateProgress();
            loadNotes();
        }
    </script>
</body>

</html>
