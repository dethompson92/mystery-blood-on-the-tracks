    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-sm);
        }

        .gallery-item {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid var(--color-slate);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item::after {
            /* Overlay */
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 77, 109, 0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* Lightbox specific styles */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.98);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border: 1px solid var(--color-slate);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .lightbox-controls {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100vw;
            display: flex;
            justify-content: space-between;
            padding: 0 var(--spacing-md);
            pointer-events: none;
            /* Let clicks pass through */
        }

        .lightbox-controls button {
            background: rgba(10, 10, 15, 0.8);
            color: var(--color-text);
            border: 1px solid var(--color-slate);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
        }

        .lightbox-controls button:hover {
            background: var(--color-primary);
            color: var(--color-black);
            border-color: var(--color-primary);
        }

        .lightbox-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .lightbox-caption {
            color: var(--color-gray);
            font-family: var(--font-evidence);
            font-size: 0.9rem;
            max-width: 70%;
        }

        .lightbox-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .lightbox-close {
            background: none;
            border: none;
            color: var(--color-primary);
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
